<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libélulas</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
    }

    /* ESTRELLAS */
    .estrella {
      position: absolute;
      border-radius: 50%;
      opacity: 0.8;
      animation: parpadeo 2s infinite alternate, moverEstrellas 100s linear infinite;
    }

    @keyframes parpadeo {
      from { opacity: 0.2; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.2); }
    }

    @keyframes moverEstrellas {
      from { transform: translateY(0); }
      to { transform: translateY(-110vh); }
    }

    /* --- LIBÉLULA GIGANTE Y UNIDA --- */
    .dragonfly-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      animation: flotarLibelula 6s ease-in-out infinite;
      transition: filter 0.1s ease;
    }

    .dragonfly {
      position: relative;
      width: 250px; 
      height: 250px;
    }

    .df-body-group {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 160px;
    }

    .df-head {
      position: absolute;
      width: 26px;
      height: 18px;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #00f2fe;
      border-radius: 12px / 8px;
      box-shadow: 0 0 20px #00f2fe;
    }

    .df-thorax {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 45px;
      background: linear-gradient(to bottom, #00f2fe, #4facfe);
      border-radius: 6px;
    }

    .df-abdomen {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 110px;
      background: linear-gradient(to bottom, #4facfe, #7028e4);
      border-radius: 4px / 55px;
    }

    /* ALAS GRANDES Y PEGADAS */
    .wing {
      position: absolute;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(0, 242, 254, 0.4), rgba(112, 40, 228, 0.4));
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 40px rgba(0, 242, 254, 0.6);
    }

    .wing.front {
      width: 165px; 
      height: 75px;
      border-radius: 50% 50% 10% 50%; 
      top: 10px;
    }

    .wing.front.left {
      left: -160px; 
      transform-origin: right center;
      animation: aleteoFrontIzq 0.1s ease-in-out infinite;
    }

    .wing.front.right {
      right: -160px;
      border-radius: 50% 50% 50% 10%;
      transform-origin: left center;
      animation: aleteoFrontDer 0.1s ease-in-out infinite;
    }

    .wing.back {
      width: 145px;
      height: 65px;
      border-radius: 50%;
      top: 45px;
    }

    .wing.back.left {
      left: -140px;
      transform-origin: right center;
      animation: aleteoBackIzq 0.12s ease-in-out infinite;
    }

    .wing.back.right {
      right: -140px;
      transform-origin: left center;
      animation: aleteoBackDer 0.12s ease-in-out infinite;
    }

    @keyframes aleteoFrontIzq { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(75deg); } }
    @keyframes aleteoFrontDer { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(-75deg); } }

    @keyframes flotarLibelula {
      0%, 100% { transform: translate(-50%, -50%) rotate(-3deg); }
      50% { transform: translate(-50%, -50%) rotate(3deg) translateY(-25px); }
    }

    /* FRASES */
    .frase {
      position: absolute;
      padding: 12px 25px;
      border-radius: 30px;
      background: rgba(112, 40, 228, 0.2); 
      border: 1px solid rgba(0, 242, 254, 0.4);
      backdrop-filter: blur(8px);
      font-size: 19px;
      font-weight: bold;
      text-shadow: 0 0 10px black;
      animation: flotarFrases 20s linear infinite;
      opacity: 0;
      z-index: 10;
    }

    @keyframes flotarFrases {
      0% { transform: translateY(110vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh); opacity: 0; }
    }

    /* REPRODUCTOR CORREGIDO */
    .player {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 42, 0.9);
      padding: 15px;
      border-radius: 25px;
      border: 1px solid #00f2fe;
      width: 85%; max-width: 350px;
      z-index: 20; text-align: center;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 5px;
    }

    .player button {
      background: #7028e4; border: none; border-radius: 50%;
      width: 40px; height: 40px; cursor: pointer; color: white;
      display: flex; align-items: center; justify-content: center;
    }

    .msg-player {
      font-size: 14px;
      font-weight: 500;
    }

    .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); margin: 10px 0; border-radius: 5px; }
    .progress { height: 100%; width: 0%; background: #00f2fe; border-radius: 5px; }
  </style>
</head>
<body>

  <div class="dragonfly-wrapper" id="libelula">
    <div class="dragonfly">
      <div class="df-body-group">
        <div class="df-head"></div>
        <div class="df-thorax"></div>
        <div class="df-abdomen"></div>
      </div>
      <div class="wing front left"></div>
      <div class="wing front right"></div>
      <div class="wing back left"></div>
      <div class="wing back right"></div>
    </div>
  </div>

  <script>
    const frasesMotivadoras = [
      "💪 ¡Tú puedes con todo!", "🦁 Eres tenaz y valiente", "✨ Tu fuerza es increíble",
      "🚀 Nada te puede detener", "🌟 Brillas más que el sol", "❤️ Eres fuerte y capaz",
      "🦋 Confía en tu magia", "🏆 Naciste para ganar", "🌈 Después de la lluvia, sales tú",
      "💎 Eres una joya única", "🌻 Sigue creciendo fuerte", "🔥 Tu potencial es infinito",
      "👑 Eres dueña de tu destino", "💫 Nunca dejes de soñar", "😊 ¡El mundo es tuyo!"
    ];

    frasesMotivadoras.forEach((texto) => {
      const div = document.createElement("div");
      div.classList.add("frase");
      div.innerText = texto;
      div.style.left = (Math.random() * 60 + 20) + "%"; 
      div.style.animationDelay = (Math.random() * 25) + "s";
      document.body.appendChild(div);
    });

    for (let i = 0; i < 100; i++) {
      const estrella = document.createElement("div");
      estrella.classList.add("estrella");
      const size = Math.random() * 3 + 1;
      estrella.style.width = size + "px";
      estrella.style.height = size + "px";
      estrella.style.top = Math.random() * 100 + "vh";
      estrella.style.left = Math.random() * 100 + "vw";
      estrella.style.background = ["#fff", "#ffeeb0", "#b0eaff"][Math.floor(Math.random()*3)];
      estrella.style.animationDuration = (Math.random() * 3 + 2) + "s, 80s";
      document.body.appendChild(estrella);
    }
  </script>

  <div class="player">
    <div class="controls-row">
      <button id="playPause">⏸</button>
      <span class="msg-player">Suerte niñaaa, tu puedes 😊</span>
    </div>
    <div class="progress-container"><div class="progress" id="progress"></div></div>
    <div style="display: flex; justify-content: space-between; font-size: 11px;">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
    <audio id="audio" autoplay loop>
      <source src="WhatsApp Audio 2026-03-01 at 3.35.49 PM.mpeg" type="audio/mpeg">
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const libelula = document.getElementById("libelula");
    const progress = document.getElementById("progress");

    function aplicarPulso() {
      if (!audio.paused) {
        const intensidad = 1 + (Math.random() * 0.4); 
        libelula.style.filter = `drop-shadow(0 0 ${12 * intensidad}px #00f2fe) brightness(${intensidad})`;
        
        document.querySelectorAll('.frase').forEach(f => {
            f.style.filter = `drop-shadow(0 0 ${6 * intensidad}px #7028e4)`;
        });
      }
      requestAnimationFrame(aplicarPulso);
    }
    aplicarPulso();

    document.getElementById("playPause").onclick = function() {
      if (audio.paused) { audio.play(); this.textContent = "⏸"; } 
      else { audio.pause(); this.textContent = "▶️"; }
    };

    audio.ontimeupdate = () => {
      progress.style.width = ((audio.currentTime / audio.duration) * 100) + "%";
      document.getElementById("current").textContent = formatTime(audio.currentTime);
      document.getElementById("duration").textContent = formatTime(audio.duration || 0);
    };

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const r = Math.floor(s % 60).toString().padStart(2, "0");
      return `${m}:${r}`;
    }
  </script>
</body>

</html>
